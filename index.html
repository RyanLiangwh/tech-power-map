<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球科技权力图谱 · Tech Power Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root{--bg:#0a0d1a;--panel:#11162a;--panel2:#171d36;--line:#2a3252;--txt:#e8ecf8;--dim:#8a93b8;
--g1:#4da3ff;--g2:#b67aff;--g3:#ffb84d;--g4:#ff6b6b;--g5:#4dd9a8;--g6:#f06ec1;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;overflow:hidden;height:100vh}
#graph{position:absolute;inset:0;cursor:grab}
#topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:10px;padding:10px 14px;
background:linear-gradient(180deg,rgba(10,13,26,.96),rgba(10,13,26,.75) 80%,transparent);flex-wrap:wrap;pointer-events:none}
#topbar *{pointer-events:auto}
#topbar h1{font-size:17px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
#topbar h1 span{color:var(--dim);font-size:11px;font-weight:400;margin-left:8px}
.searchwrap{position:relative}
#search{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 12px;width:230px;font-size:13px;outline:none}
#search:focus{border-color:var(--g1)}
#sugg{position:absolute;top:36px;left:0;width:280px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;max-height:260px;overflow:auto;display:none;z-index:30}
#sugg div{padding:7px 12px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;gap:8px}
#sugg div:hover{background:#222a4d}
#sugg .o{color:var(--dim);font-size:11px}
.btn{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 13px;font-size:13px;cursor:pointer;white-space:nowrap}
.btn:hover{border-color:var(--g1)}
.btn.active{background:#1d3a6b;border-color:var(--g1);color:#bcd8ff}
#hint{font-size:12px;color:var(--dim)}
#panel{position:fixed;top:62px;right:12px;bottom:12px;width:340px;background:rgba(17,22,42,.94);border:1px solid var(--line);
border-radius:14px;z-index:25;display:none;flex-direction:column;backdrop-filter:blur(6px);overflow:hidden}
#panel.show{display:flex}
#phead{padding:14px 16px 10px;border-bottom:1px solid var(--line);position:relative;flex-shrink:0}
#pclose{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
#pbody{padding:12px 16px;overflow-y:auto;flex:1 1 0;min-height:0;max-height:calc(100vh - 200px);overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
#pbody::-webkit-scrollbar{width:10px}
#pbody::-webkit-scrollbar-thumb{background:#3a4570;border-radius:5px;border:2px solid #11162a}
#pbody::-webkit-scrollbar-thumb:hover{background:#4d5a8f}
.pname{font-size:18px;font-weight:700}
.pen{color:var(--dim);font-size:12px;margin-top:2px}
.ptitle{font-size:12.5px;color:#c2cbe8;margin-top:6px;line-height:1.5}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-top:8px}
.rel{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:8px;cursor:pointer}
.rel:hover{border-color:var(--g1)}
.rel .rh{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;flex-wrap:wrap}
.rel .rd{font-size:12px;color:#aab3d6;margin-top:4px;line-height:1.55}
.kbadge{font-size:10.5px;padding:1px 7px;border-radius:8px;color:#0a0d1a;font-weight:700}
.cbadge{font-size:10px;padding:1px 6px;border-radius:7px;border:1px solid;background:transparent;white-space:nowrap}
.srcs{font-size:11px;color:#6f78a0;margin-top:6px}
.srcs a{color:#7fb3ff;text-decoration:none;margin-right:2px}
.srcs a:hover{text-decoration:underline}
.srcs-empty{color:#5a627f;font-style:italic}
.cdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:4px;vertical-align:middle}
.sec{font-size:12px;color:var(--dim);margin:10px 0 8px;letter-spacing:1px}
#legend{position:fixed;left:12px;bottom:12px;z-index:15;background:rgba(17,22,42,.9);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:12px;backdrop-filter:blur(6px)}
#legend .lrow{display:flex;align-items:center;gap:7px;margin:3px 0;cursor:pointer;user-select:none}
#legend .lrow.off{opacity:.32}
#legend .dot{width:10px;height:10px;border-radius:50%}
#legend .ltitle{color:var(--dim);margin-bottom:5px;letter-spacing:1px;font-size:11px}
#klegend{position:fixed;left:12px;bottom:12px;display:none}
#tooltip{position:fixed;pointer-events:none;background:rgba(23,29,54,.97);border:1px solid var(--line);border-radius:10px;
padding:9px 12px;font-size:12.5px;z-index:40;display:none;max-width:300px;line-height:1.5;box-shadow:0 6px 24px rgba(0,0,0,.5)}
#tooltip b{font-size:13.5px}
#tooltip .tt-en{color:var(--dim);font-size:11px}
#pathbar{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:18;background:rgba(29,42,80,.95);border:1px solid var(--g1);
border-radius:12px;padding:9px 16px;font-size:13px;display:none;align-items:center;gap:10px;backdrop-filter:blur(6px)}
.slot{background:var(--panel);border:1px dashed var(--dim);border-radius:8px;padding:3px 10px;min-width:90px;text-align:center;font-size:12.5px}
.slot.filled{border-style:solid;border-color:var(--g1);color:#bcd8ff}
#stats{font-size:11.5px;color:var(--dim);margin-left:auto;white-space:nowrap}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:#2a3252;border-radius:4px}
#erabar{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;z-index:15;background:rgba(17,22,42,.92);border:1px solid var(--line);border-radius:12px;padding:8px 12px;display:flex;gap:6px;backdrop-filter:blur(6px);flex-wrap:wrap;max-width:72vw;justify-content:center}
.echip{font-size:11.5px;padding:4px 10px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap;color:var(--txt)}
.echip small{color:var(--dim);margin-left:4px;font-size:10px}
.echip.off{opacity:.3}
.ttav{width:46px;height:46px;border-radius:50%;object-fit:cover;float:left;margin:2px 8px 2px 0;border:2px solid #2a3252}
.phav{width:54px;height:54px;border-radius:50%;object-fit:cover;float:right;border:2px solid #2a3252;margin-left:8px}
@media(max-width:760px){#panel{width:calc(100vw - 24px)}#search{width:150px}}
</style>
</head>
<body>
<div id="topbar">
<h1>全球科技权力图谱<span>Tech Power Map · 2026.6</span></h1>
<div class="searchwrap"><input id="search" placeholder="搜索人物 (中/英文名)…" autocomplete="off"><div id="sugg"></div></div>
<button class="btn" id="modeBtn">⇄ 双人关系查询</button>
<button class="btn" id="insightBtn">✦ 隐藏关系</button>
<button class="btn" id="resetBtn">重置视图</button>
<span id="hint">点击人物看TA的关系网 · 点击连线看两人关系</span>
<span id="stats"></span>
</div>
<div id="pathbar"><b>双人关系查询:</b><span class="slot" id="slotA">点选第一人</span>→<span class="slot" id="slotB">点选第二人</span><button class="btn" id="pathClear">清空</button><button class="btn" id="pathExit">退出</button></div>
<div id="graph"></div>
<div id="legend"></div>
<div id="erabar"></div>
<div id="panel"><div id="phead"><button id="pclose">✕</button><div id="pheadc"></div></div><div id="pbody"></div></div>
<div id="tooltip"></div>
<script src="./data.js"></script>
<script>
const GROUPS={1:["科技巨头",getComputedStyle(document.documentElement).getPropertyValue('--g1').trim()||"#4da3ff"],2:["AI 阵营","#b67aff"],3:["半导体/硬件","#ffb84d"],4:["中国科技","#ff6b6b"],5:["投资人","#4dd9a8"],6:["平台新贵",'#f06ec1'],7:["先驱与传奇","#9aa5c4"]};
const KINDS={cofounder:["创业搭档","#ffd166"],work:["共事/上下级","#7fb3ff"],invest:["投资","#4dd9a8"],mentor:["师徒/提携","#c9a7ff"],rival:["竞争对手","#ff7b7b"],ally:["合作盟友","#67e0e3"],friend:["私交好友","#ffa7d1"],family:["家人/伴侣","#ff5da2"],feud:["恩怨/反目","#ff4d4d"]};
const ERAS={ind:["工业与电气","1870-1945"],elec:["晶体管与大型机","1945-1975"],pc:["PC与软件","1975-1995"],web:["互联网","1995-2010"],mob:["移动与云","2010-2020"],ai:["AI时代","2020s"]};
const {PEOPLE,RELATIONS,INSIGHTS}=window.TPM;

/* ============ 可信度分级 (来源机制) ============ */
/* CONF: 三档可信度. KIND_CONF: 按关系类型给默认档(可被单条关系的 c 字段覆盖). */
const CONF={1:["公开可查","#4dd9a8"],2:["广泛报道","#7fb3ff"],3:["含主观概括","#ffb84d"]};
const KIND_CONF={family:1,cofounder:1,work:1,invest:1,mentor:2,rival:2,ally:2,feud:2,friend:3};
function confOf(r){return CONF[r.c||KIND_CONF[r.k]||2];}
function confBadge(r){const c=confOf(r);return `<span class="cbadge" style="color:${c[1]};border-color:${c[1]}66" title="可信度: ${c[0]}">${c[0]}</span>`;}
function srcHtml(r){
  if(r.src&&r.src.length){return `<div class="srcs">来源:${r.src.map((u,i)=>`<a href="${u}" target="_blank" rel="noopener">[${i+1}]</a>`).join(" ")}</div>`;}
  return `<div class="srcs srcs-empty">来源待补 · 当前为公开报道整理</div>`;}

/* ================= 图谱渲染 ================= */
const W=innerWidth,H=innerHeight;
const pmap=new Map(PEOPLE.map(p=>[p.id,p]));
const deg={};RELATIONS.forEach(r=>{deg[r.s]=(deg[r.s]||0)+1;deg[r.t]=(deg[r.t]||0)+1});
const nodes=PEOPLE.map(p=>({...p,d:deg[p.id]||1}));
const links=RELATIONS.map((r,i)=>({...r,source:r.s,target:r.t,i}));
const adj=new Map();nodes.forEach(n=>adj.set(n.id,new Set()));
const edgeOf=new Map();
RELATIONS.forEach(r=>{adj.get(r.s).add(r.t);adj.get(r.t).add(r.s);
edgeOf.set(r.s+"|"+r.t,r);edgeOf.set(r.t+"|"+r.s,r);});
const R=d=>4.5+Math.sqrt(d)*2.2;
const AVA={};
document.getElementById("stats").textContent=`${nodes.length} 位人物 · ${links.length} 条关系`;

const svg=d3.select("#graph").append("svg").attr("width",W).attr("height",H);
const defs=svg.append("defs");
const root=svg.append("g");
const zoom=d3.zoom().scaleExtent([.25,6]).on("zoom",e=>{root.attr("transform",e.transform);updateLabels(e.transform.k);});
svg.call(zoom);
const linkSel=root.append("g").selectAll("line").data(links).join("line")
.attr("stroke",l=>KINDS[l.k][1]).attr("stroke-opacity",.28).attr("stroke-width",1)
.style("cursor","pointer")
.on("mouseover",function(e,l){if(mode.pair)return;d3.select(this).attr("stroke-opacity",.95).attr("stroke-width",2.4);
showTip(e,`<b>${pmap.get(l.s).zh} ↔ ${pmap.get(l.t).zh}</b><br><span style="color:${KINDS[l.k][1]}">●</span> ${KINDS[l.k][0]}<br><span class="tt-en">点击查看详情</span>`);})
.on("mouseout",function(){hideTip();refresh();})
.on("click",(e,l)=>{e.stopPropagation();selectEdge(l);});
const nodeSel=root.append("g").selectAll("circle").data(nodes).join("circle")
.attr("r",n=>R(n.d)).attr("fill",n=>GROUPS[n.g][1]).attr("stroke","#0a0d1a").attr("stroke-width",1.2)
.style("cursor","pointer")
.call(d3.drag().on("start",(e,n)=>{if(!e.active)sim.alphaTarget(.25).restart();n.fx=n.x;n.fy=n.y;})
.on("drag",(e,n)=>{n.fx=e.x;n.fy=e.y;}).on("end",(e,n)=>{if(!e.active)sim.alphaTarget(0);n.fx=null;n.fy=null;}))
.on("mouseover",(e,n)=>{showTip(e,(AVA[n.id]?'<img class="ttav" src="'+AVA[n.id]+'">':"")+`<b>${n.zh}</b> <span class="tt-en">${n.en}</span><br>${n.org}<br><span style="color:#aab3d6">${n.title}</span>`);if(!mode.pair&&!state.node&&!state.edge)softHL(n.id);})
.on("mousemove",moveTip).on("mouseout",()=>{hideTip();if(!state.node&&!state.edge&&!mode.pair)refresh();})
.on("click",(e,n)=>{e.stopPropagation();mode.pair?pickPair(n):selectNode(n.id,true);});
const labelSel=root.append("g").selectAll("text").data(nodes).join("text")
.text(n=>n.zh).attr("font-size",n=>Math.max(9,Math.min(15,7+n.d*.45)))
.attr("fill","#dfe6ff").attr("stroke","#0a0d1a").attr("stroke-width",3).attr("paint-order","stroke")
.attr("text-anchor","middle").style("pointer-events","none");

const sim=d3.forceSimulation(nodes)
.force("link",d3.forceLink(links).id(n=>n.id).distance(l=>l.source.g===l.target.g?55:95).strength(.25))
.force("charge",d3.forceManyBody().strength(-150).distanceMax(420))
.force("center",d3.forceCenter(W/2,H/2+20))
.force("collide",d3.forceCollide(n=>R(n.d)+4))
.force("x",d3.forceX(n=>W/2+Math.cos(n.g/7*2*Math.PI)*W*.16).strength(.045))
.force("y",d3.forceY(n=>H/2+Math.sin(n.g/7*2*Math.PI)*H*.16).strength(.045))
.on("tick",()=>{linkSel.attr("x1",l=>l.source.x).attr("y1",l=>l.source.y).attr("x2",l=>l.target.x).attr("y2",l=>l.target.y);
nodeSel.attr("cx",n=>n.x).attr("cy",n=>n.y);labelSel.attr("x",n=>n.x).attr("y",n=>n.y-R(n.d)-4);});

/* ============ 状态与高亮 ============ */
const state={node:null,edge:null,chain:null,offG:new Set(),offK:new Set(),offE:new Set()};
const mode={pair:false,A:null,B:null,path:null};
let zk=1;
function updateLabels(k){zk=k;labelSel.attr("display",n=>!visN(n)?"none":(n.d>=8||k>=1.25?null:"none"));}
function visN(n){return !state.offG.has(n.g)&&!state.offE.has(n.era);}
function visL(l){return visN(l.source)&&visN(l.target)&&!state.offK.has(l.k);}
function refresh(){
const hl=computeHL();
nodeSel.attr("display",n=>visN(n)?null:"none")
.attr("opacity",n=>!hl?1:(hl.n.has(n.id)?1:.12))
.attr("stroke",n=>hl&&hl.core&&hl.core.has(n.id)?"#fff":(AVA[n.id]?GROUPS[n.g][1]:"#0a0d1a"))
.attr("stroke-width",n=>hl&&hl.core&&hl.core.has(n.id)?2.4:(AVA[n.id]?1.6:1.2));
linkSel.attr("display",l=>visL(l)?null:"none")
.attr("stroke-opacity",l=>!hl?.28:(hl.l.has(l.i)?.95:.05))
.attr("stroke-width",l=>!hl?1:(hl.l.has(l.i)?2.6:.7));
labelSel.attr("opacity",n=>!hl?1:(hl.n.has(n.id)?1:.1));
updateLabels(zk);}
function computeHL(){
if(state.chain)return state.chain;
if(mode.pair&&mode.path)return mode.path;
if(state.edge){const l=state.edge;return{n:new Set([l.s,l.t]),l:new Set([l.i]),core:new Set([l.s,l.t])};}
if(state.node){const id=state.node,ns=new Set([id]);adj.get(id).forEach(x=>ns.add(x));
const ls=new Set();links.forEach(l=>{if(l.s===id||l.t===id)ls.add(l.i);});
return{n:ns,l:ls,core:new Set([id])};}
return null;}
function softHL(id){const ns=new Set([id]);adj.get(id).forEach(x=>ns.add(x));
nodeSel.attr("opacity",n=>ns.has(n.id)?1:.15);
linkSel.attr("stroke-opacity",l=>(l.s===id||l.t===id)?.85:.06).attr("stroke-width",l=>(l.s===id||l.t===id)?2.2:.7);
labelSel.attr("opacity",n=>ns.has(n.id)?1:.1);}

/* ============ 侧栏 ============ */
const panel=document.getElementById("panel"),phc=document.getElementById("pheadc"),pb=document.getElementById("pbody");
document.getElementById("pclose").onclick=()=>{panel.classList.remove("show");state.node=null;state.edge=null;state.chain=null;refresh();};
function kb(k){return `<span class="kbadge" style="background:${KINDS[k][1]}">${KINDS[k][0]}</span>`;}
function selectNode(id,zoomTo){state.node=id;state.edge=null;state.chain=null;pb.scrollTop=0;const p=pmap.get(id);
phc.innerHTML=(AVA[id]?'<img class="phav" src="'+AVA[id]+'">':"")+`<div class="pname">${p.zh}</div><div class="pen">${p.en} · ${p.org}</div><div class="ptitle">${p.title}</div>
<span class="tag" style="background:${GROUPS[p.g][1]}22;color:${GROUPS[p.g][1]};border:1px solid ${GROUPS[p.g][1]}55">${GROUPS[p.g][0]}</span>
<span class="tag" style="background:#222a4d;color:#aab3d6">${deg[id]||0} 条关系</span><span class="tag" style="background:#222a4d;color:#aab3d6">${(ERAS[p.era]||["—"])[0]}</span>`;
const rels=RELATIONS.filter(r=>r.s===id||r.t===id);
const order={family:0,cofounder:1,mentor:2,feud:3,friend:4,rival:5,invest:6,ally:7,work:8};
rels.sort((a,b)=>order[a.k]-order[b.k]);
pb.innerHTML=`<div class="sec">关系网络 (${rels.length})</div>`+rels.map(r=>{
const o=pmap.get(r.s===id?r.t:r.s);
return `<div class="rel" data-s="${r.s}" data-t="${r.t}"><div class="rh">${kb(r.k)} ${o.zh} <span style="color:var(--dim);font-size:11px">${o.en}</span><span class="cdot" style="background:${confOf(r)[1]}" title="可信度: ${confOf(r)[0]}"></span></div><div class="rd">${r.d}</div></div>`;}).join("");
pb.querySelectorAll(".rel").forEach(el=>el.onclick=()=>{const l=links.find(x=>x.s===el.dataset.s&&x.t===el.dataset.t);if(l)selectEdge(l);});
panel.classList.add("show");refresh();
if(zoomTo){const n=nodes.find(x=>x.id===id);
svg.transition().duration(650).call(zoom.transform,d3.zoomIdentity.translate(W/2-n.x*1.6,H/2-n.y*1.6).scale(1.6));}}
function selectEdge(l){state.edge=l;state.node=null;state.chain=null;pb.scrollTop=0;
const a=pmap.get(l.s),b=pmap.get(l.t);
phc.innerHTML=`<div class="pname" style="font-size:16px">${a.zh} ↔ ${b.zh}</div><div class="pen">${a.en} ↔ ${b.en}</div>
<span class="tag" style="background:${KINDS[l.k][1]}22;color:${KINDS[l.k][1]};border:1px solid ${KINDS[l.k][1]}55">${KINDS[l.k][0]}</span> ${confBadge(l)}`;
pb.innerHTML=`<div class="sec">关系详情</div><div class="rel" style="cursor:default"><div class="rd" style="font-size:13px;color:#dfe6ff">${l.d}</div>${srcHtml(l)}</div>
<div class="sec">两位人物</div>`+[a,b].map(p=>`<div class="rel" data-id="${p.id}"><div class="rh">${p.zh} <span style="color:var(--dim);font-size:11px">${p.en}</span></div><div class="rd">${p.org} · ${p.title}</div></div>`).join("");
pb.querySelectorAll(".rel[data-id]").forEach(el=>el.onclick=()=>selectNode(el.dataset.id,true));
panel.classList.add("show");refresh();}

/* ============ 双人路径 ============ */
const pathbar=document.getElementById("pathbar"),slotA=document.getElementById("slotA"),slotB=document.getElementById("slotB");
document.getElementById("modeBtn").onclick=()=>{mode.pair=!mode.pair;
document.getElementById("modeBtn").classList.toggle("active",mode.pair);
pathbar.style.display=mode.pair?"flex":"none";
if(!mode.pair){mode.A=mode.B=mode.path=null;slotA.textContent="点选第一人";slotB.textContent="点选第二人";slotA.classList.remove("filled");slotB.classList.remove("filled");}
state.node=null;state.edge=null;state.chain=null;panel.classList.remove("show");refresh();};
document.getElementById("pathExit").onclick=()=>document.getElementById("modeBtn").click();
document.getElementById("pathClear").onclick=()=>{mode.A=mode.B=mode.path=null;slotA.textContent="点选第一人";slotB.textContent="点选第二人";slotA.classList.remove("filled");slotB.classList.remove("filled");panel.classList.remove("show");refresh();};
function pickPair(n){
if(!mode.A||mode.B){mode.A=n.id;mode.B=null;mode.path=null;slotA.textContent=n.zh;slotA.classList.add("filled");slotB.textContent="点选第二人";slotB.classList.remove("filled");refresh();}
else if(n.id!==mode.A){mode.B=n.id;slotB.textContent=n.zh;slotB.classList.add("filled");runPath();}}
function bfs(a,b){const prev=new Map([[a,null]]);let q=[a];
while(q.length){const nq=[];for(const u of q){if(u===b){const path=[];let x=b;while(x!==null){path.unshift(x);x=prev.get(x);}return path;}
for(const v of adj.get(u))if(!prev.has(v)){prev.set(v,u);nq.push(v);}}q=nq;}return null;}
function runPath(){const path=bfs(mode.A,mode.B);
const a=pmap.get(mode.A),b=pmap.get(mode.B);
if(!path){mode.path={n:new Set([mode.A,mode.B]),l:new Set(),core:new Set([mode.A,mode.B])};
phc.innerHTML=`<div class="pname" style="font-size:16px">${a.zh} ↔ ${b.zh}</div>`;
pb.innerHTML=`<div class="sec">两人在图谱中暂无可达关系链</div>`;panel.classList.add("show");refresh();return;}
const ns=new Set(path),ls=new Set();const segs=[];
for(let i=0;i<path.length-1;i++){const r=edgeOf.get(path[i]+"|"+path[i+1]);
const l=links.find(x=>x.s===r.s&&x.t===r.t);ls.add(l.i);segs.push({from:pmap.get(path[i]),to:pmap.get(path[i+1]),r});}
mode.path={n:ns,l:ls,core:new Set([mode.A,mode.B])};
phc.innerHTML=`<div class="pname" style="font-size:16px">${a.zh} → ${b.zh}</div><div class="pen">${path.length-1===1?"存在直接关系":`通过 ${path.length-2} 位中间人相连`} · 关系链 ${path.length-1} 步</div>`;
pb.innerHTML=`<div class="sec">关系链路</div>`+segs.map((s,i)=>`<div class="rel" style="cursor:default"><div class="rh"><span style="color:var(--dim)">${i+1}.</span> ${s.from.zh} ${kb(s.r.k)} ${s.to.zh}<span class="cdot" style="background:${confOf(s.r)[1]}" title="可信度: ${confOf(s.r)[0]}"></span></div><div class="rd">${s.r.d}</div></div>`).join("");
panel.classList.add("show");refresh();}

/* ============ 搜索 ============ */
const inp=document.getElementById("search"),sugg=document.getElementById("sugg");
inp.oninput=()=>{const q=inp.value.trim().toLowerCase();if(!q){sugg.style.display="none";return;}
const hits=PEOPLE.filter(p=>p.zh.toLowerCase().includes(q)||p.en.toLowerCase().includes(q)||p.org.toLowerCase().includes(q)).slice(0,12);
sugg.innerHTML=hits.map(p=>`<div data-id="${p.id}"><span>${p.zh} <span class="o">${p.en}</span></span><span class="o">${p.org}</span></div>`).join("")||`<div>无结果</div>`;
sugg.style.display="block";
sugg.querySelectorAll("[data-id]").forEach(el=>el.onclick=()=>{const id=el.dataset.id;sugg.style.display="none";inp.value="";
if(mode.pair){pickPair(nodes.find(n=>n.id===id));}else selectNode(id,true);});};
document.addEventListener("click",e=>{if(!e.target.closest(".searchwrap"))sugg.style.display="none";});

/* ============ 图例与筛选 ============ */
const lg=document.getElementById("legend");
lg.innerHTML=`<div class="ltitle">阵营(点击隐藏/显示)</div>`+Object.entries(GROUPS).map(([g,[name,c]])=>
`<div class="lrow" data-g="${g}"><span class="dot" style="background:${c}"></span>${name}</div>`).join("")
+`<div class="ltitle" style="margin-top:8px">关系类型(点击筛选)</div>`+Object.entries(KINDS).map(([k,[name,c]])=>
`<div class="lrow" data-k="${k}"><span class="dot" style="background:${c};border-radius:2px;height:3px"></span>${name}</div>`).join("");
lg.querySelectorAll("[data-g]").forEach(el=>el.onclick=()=>{const g=+el.dataset.g;
state.offG.has(g)?state.offG.delete(g):state.offG.add(g);el.classList.toggle("off");refresh();});
lg.querySelectorAll("[data-k]").forEach(el=>el.onclick=()=>{const k=el.dataset.k;
state.offK.has(k)?state.offK.delete(k):state.offK.add(k);el.classList.toggle("off");refresh();});

/* ============ 其他 ============ */
const tip=document.getElementById("tooltip");
function showTip(e,html){tip.innerHTML=html;tip.style.display="block";moveTip(e);}
function moveTip(e){const x=Math.min(e.clientX+14,innerWidth-310),y=Math.min(e.clientY+14,innerHeight-110);tip.style.left=x+"px";tip.style.top=y+"px";}
function hideTip(){tip.style.display="none";}
svg.on("click",()=>{if(mode.pair)return;state.node=null;state.edge=null;state.chain=null;panel.classList.remove("show");refresh();});
document.getElementById("resetBtn").onclick=()=>{state.node=null;state.edge=null;state.chain=null;state.offG.clear();state.offK.clear();state.offE.clear();document.querySelectorAll("#erabar .echip").forEach(el=>el.classList.remove("off"));
lg.querySelectorAll(".lrow").forEach(el=>el.classList.remove("off"));
panel.classList.remove("show");svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity);refresh();};
addEventListener("resize",()=>{svg.attr("width",innerWidth).attr("height",innerHeight);
sim.force("center",d3.forceCenter(innerWidth/2,innerHeight/2+20)).alpha(.3).restart();});

/* ============ 隐藏关系洞察 ============ */

const PRIV=new Set(["family","friend","mentor","feud"]);
function chainSegs(p){const segs=[];for(let i=0;i<p.length-1;i++){const r=edgeOf.get(p[i]+"|"+p[i+1]);if(!r)return null;segs.push({a:pmap.get(p[i]),b:pmap.get(p[i+1]),r});}return segs;}
function setChain(p){const ns=new Set(p),ls=new Set();
for(let i=0;i<p.length-1;i++){const r=edgeOf.get(p[i]+"|"+p[i+1]);const l=links.find(x=>x.s===r.s&&x.t===r.t);ls.add(l.i);}
state.chain={n:ns,l:ls,core:new Set([p[0],p[p.length-1]])};state.node=null;state.edge=null;refresh();}
function showInsightList(){state.chain=null;state.node=null;state.edge=null;pb.scrollTop=0;
phc.innerHTML=`<div class="pname">✦ 隐藏关系</div><div class="pen">看似无关的人,其实暗中相连 · 点击查看路径</div>`;
pb.innerHTML=`<div class="rel" id="rndBtn" style="border-color:#4dd9a8"><div class="rh" style="color:#4dd9a8">⟳ 随机发现一条意外连接</div><div class="rd">从25万+种两两组合中,挖一条带私人纽带的隐藏路径</div></div>
<div class="sec">精选洞察 (${INSIGHTS.length})</div>`+INSIGHTS.map((it,i)=>
`<div class="rel" data-i="${i}"><div class="rh">${it.t}</div><div class="rd">${it.p.map(id=>pmap.get(id).zh).join(" → ")}</div></div>`).join("");
document.getElementById("rndBtn").onclick=showRandom;
pb.querySelectorAll(".rel[data-i]").forEach(el=>el.onclick=()=>showInsight(+el.dataset.i));
panel.classList.add("show");refresh();}
function renderChainDetail(title,note,p){const segs=chainSegs(p);if(!segs)return;
setChain(p);pb.scrollTop=0;
phc.innerHTML=`<div class="pname" style="font-size:16px">${title}</div><div class="pen">${p.map(id=>pmap.get(id).zh).join(" → ")}</div>`;
pb.innerHTML=`<div class="rel" style="cursor:default;border-color:#4d5a8f"><div class="rd" style="font-size:13px;color:#dfe6ff">${note}</div></div>
<div class="sec">关系链路</div>`+segs.map((s,i)=>`<div class="rel" style="cursor:default"><div class="rh"><span style="color:var(--dim)">${i+1}.</span> ${s.a.zh} ${kb(s.r.k)} ${s.b.zh}<span class="cdot" style="background:${confOf(s.r)[1]}" title="可信度: ${confOf(s.r)[0]}"></span></div><div class="rd">${s.r.d}</div></div>`).join("")
+`<div class="rel" id="backIns" style="text-align:center"><div class="rh" style="justify-content:center">← 返回洞察列表</div></div>`;
document.getElementById("backIns").onclick=showInsightList;
panel.classList.add("show");}
function showInsight(i){const it=INSIGHTS[i];renderChainDetail(it.t,it.n,it.p);}
function showRandom(){
for(let tries=0;tries<600;tries++){
const a=nodes[Math.random()*nodes.length|0],b=nodes[Math.random()*nodes.length|0];
if(a.id===b.id||a.g===b.g||adj.get(a.id).has(b.id))continue;
const p=bfs(a.id,b.id);if(!p||p.length<3||p.length>4)continue;
let priv=false;for(let i=0;i<p.length-1;i++)if(PRIV.has(edgeOf.get(p[i]+"|"+p[i+1]).k))priv=true;
if(!priv)continue;
renderChainDetail(`${a.zh} 和 ${b.zh},看似无关…`,`一位${GROUPS[a.g][0]}阵营的${a.org.split(" ")[0]}掌门,和一位${GROUPS[b.g][0]}阵营的人物,中间只隔 ${p.length-2} 个人,而且路径上藏着私人纽带。`,p);return;}
showInsightList();}
document.getElementById("insightBtn").onclick=()=>{if(mode.pair)document.getElementById("modeBtn").click();showInsightList();};

/* ============ 时代筛选条 ============ */
const eb=document.getElementById("erabar");
eb.innerHTML=Object.entries(ERAS).map(([k,v])=>`<div class="echip" data-e="${k}">${v[0]}<small>${v[1]}</small></div>`).join("");
eb.querySelectorAll(".echip").forEach(el=>{el.onclick=()=>{const k=el.dataset.e;state.offE.has(k)?state.offE.delete(k):state.offE.add(k);el.classList.toggle("off");refresh();};});
/* ============ Wikipedia 头像 ============ */
function setAva(id,url){AVA[id]=url;
defs.append("pattern").attr("id","pat-"+id).attr("patternContentUnits","objectBoundingBox").attr("width",1).attr("height",1)
.append("image").attr("href",url).attr("width",1).attr("height",1).attr("preserveAspectRatio","xMidYMid slice");
nodeSel.filter(d=>d.id===id).attr("fill","url(#pat-"+id+")");}
(async function(){let cache={};try{cache=JSON.parse(localStorage.getItem("tpm_ava_v2")||"{}")}catch(e){}
nodes.forEach(n=>{if(cache[n.id])setAva(n.id,cache[n.id])});
if(Object.keys(cache).length)refresh();
const todo=nodes.filter(n=>!cache[n.id]);let qi=0,got=0;
async function one(n){const tries=[];if(n.w)tries.push(["en",n.w]);tries.push(["en",n.en]);if(!/·/.test(n.zh))tries.push(["zh",n.zh]);
for(const[lg,t]of tries){try{
const r=await fetch("https://"+lg+".wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(t.replace(/ /g,"_")));
if(!r.ok)continue;const j=await r.json();const u=j.thumbnail&&j.thumbnail.source;
if(u){cache[n.id]=u;setAva(n.id,u);got++;return;}}catch(e){}}}
await Promise.all(Array.from({length:8},async()=>{while(qi<todo.length){await one(todo[qi++]);}}));
try{localStorage.setItem("tpm_ava_v2",JSON.stringify(cache))}catch(e){}
if(got)refresh();})();
updateLabels(1);refresh();
</script>
